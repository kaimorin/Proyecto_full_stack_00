spring.application.name=notificaciones

server.port=9001

# Configuración de conexión a MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/notificaciones
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA: desactivar creación automática de tablas
spring.jpa.hibernate.ddl-auto=none

# Dialecto recomendado para MySQL
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Flyway: habilitar migraciones
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# OpenAPI/Swagger Configuration
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
